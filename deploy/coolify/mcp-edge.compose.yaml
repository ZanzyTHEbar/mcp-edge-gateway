name: mcp-edge

services:
  mcp-edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    image: mcp-edge:coolify
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MCP_PLATFORM_ENV: ${MCP_PLATFORM_ENV:-production}
      MCP_PLATFORM_LOG_LEVEL: ${MCP_PLATFORM_LOG_LEVEL:-info}
      MCP_PLATFORM_DATABASE_URL: ${MCP_PLATFORM_DATABASE_URL:-file:/data/mcp-platform/mcp-platform.db}
      MCP_DOCKER_NETWORK: ${MCP_DOCKER_NETWORK:-coolify}
      MCP_SECRETS_DIR: ${MCP_SECRETS_DIR:-/data/coolify/mcp-platform-secrets}
      MCP_EDGE_HTTP_BIND_ADDR: ${MCP_EDGE_HTTP_BIND_ADDR:-:8080}
      MCP_EDGE_PUBLIC_BASE_URL: ${MCP_EDGE_PUBLIC_BASE_URL:?set MCP_EDGE_PUBLIC_BASE_URL}
      MCP_EDGE_AUTHENTIK_ISSUER_URL: ${MCP_EDGE_AUTHENTIK_ISSUER_URL:?set MCP_EDGE_AUTHENTIK_ISSUER_URL}
      MCP_EDGE_AUTHENTIK_CLIENT_ID: ${MCP_EDGE_AUTHENTIK_CLIENT_ID:?set MCP_EDGE_AUTHENTIK_CLIENT_ID}
      MCP_EDGE_AUTHENTIK_CLIENT_SECRET_PATH: /run/secrets/mcp-edge-authentik-client-secret
      MCP_EDGE_OPERATOR_TOKEN_PATH: /run/secrets/mcp-edge-operator-token
      MCP_EDGE_SESSION_ENCRYPTION_KEY_PATH: /run/secrets/mcp-edge-session-encryption-key
      MCP_EDGE_COOKIE_SECURE: ${MCP_EDGE_COOKIE_SECURE:-true}
      MCP_EDGE_CORS_ALLOWED_ORIGINS: ${MCP_EDGE_CORS_ALLOWED_ORIGINS:-}
      MCP_EDGE_DCR_ENABLED: ${MCP_EDGE_DCR_ENABLED:-false}
      MCP_EDGE_CIMD_ENABLED: ${MCP_EDGE_CIMD_ENABLED:-false}
    volumes:
      - /data/coolify/mcp-platform-data:/data/mcp-platform
      - type: bind
        source: /data/coolify/mcp-platform-secrets/mcp-edge-authentik-client-secret
        target: /run/secrets/mcp-edge-authentik-client-secret
        read_only: true
      - type: bind
        source: /data/coolify/mcp-platform-secrets/mcp-edge-operator-token
        target: /run/secrets/mcp-edge-operator-token
        read_only: true
      - type: bind
        source: /data/coolify/mcp-platform-secrets/mcp-edge-session-encryption-key
        target: /run/secrets/mcp-edge-session-encryption-key
        read_only: true
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - /app/mcp-edge
        - healthcheck
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - coolify

networks:
  coolify:
    name: ${MCP_DOCKER_NETWORK:-coolify}
    external: true
