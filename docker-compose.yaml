name: mcp-platform-core

services:
  infisical-bridge:
    build:
      context: .
      dockerfile: Dockerfile.infisical-bridge
    image: infisical-bridge:coolify
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m
      - /var/run:size=1m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MCP_INFISICAL_BRIDGE_UPSTREAM_HOST: ${MCP_INFISICAL_BRIDGE_UPSTREAM_HOST:?set MCP_INFISICAL_BRIDGE_UPSTREAM_HOST}
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/ >/dev/null
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - coolify

  mcp-control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    image: mcp-control-plane:coolify
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MCP_PLATFORM_ENV: ${MCP_PLATFORM_ENV:-production}
      MCP_PLATFORM_LOG_LEVEL: ${MCP_PLATFORM_LOG_LEVEL:-info}
      MCP_PLATFORM_DATABASE_URL: ${MCP_PLATFORM_DATABASE_URL:-file:/data/mcp-platform/mcp-platform.db}
      MCP_PLATFORM_DATA_VOLUME: ${MCP_PLATFORM_DATA_VOLUME:-mcp-platform-data}
      MCP_DOCKER_NETWORK: ${MCP_DOCKER_NETWORK:-coolify}
      MCP_SECRETS_DIR: ${MCP_SECRETS_DIR:-/data/mcp-platform-secrets}
      MCP_CONTROL_PLANE_HTTP_BIND_ADDR: ${MCP_CONTROL_PLANE_HTTP_BIND_ADDR:-:8081}
      MCP_CONTROL_PLANE_RECONCILE_INTERVAL: ${MCP_CONTROL_PLANE_RECONCILE_INTERVAL:-30s}
      MCP_CONTROL_PLANE_HEALTHCHECK_INTERVAL: ${MCP_CONTROL_PLANE_HEALTHCHECK_INTERVAL:-30s}
      MCP_CONTROL_PLANE_AUTHENTIK_ISSUER_URL: ${MCP_CONTROL_PLANE_AUTHENTIK_ISSUER_URL:?set MCP_CONTROL_PLANE_AUTHENTIK_ISSUER_URL}
      MCP_CONTROL_PLANE_AUTHENTIK_CLIENT_ID: ${MCP_CONTROL_PLANE_AUTHENTIK_CLIENT_ID:?set MCP_CONTROL_PLANE_AUTHENTIK_CLIENT_ID}
      MCP_CONTROL_PLANE_AUTHENTIK_CLIENT_SECRET_PATH: ${MCP_CONTROL_PLANE_AUTHENTIK_CLIENT_SECRET_PATH:-/platform/mcp-control-plane/authentik-client-secret}
      MCP_CONTROL_PLANE_COOLIFY_API_BASE_URL: ${MCP_CONTROL_PLANE_COOLIFY_API_BASE_URL:?set MCP_CONTROL_PLANE_COOLIFY_API_BASE_URL}
      MCP_CONTROL_PLANE_COOLIFY_API_TOKEN_PATH: ${MCP_CONTROL_PLANE_COOLIFY_API_TOKEN_PATH:-/platform/mcp-control-plane/coolify-api-token}
      MCP_CONTROL_PLANE_COOLIFY_PROJECT_UUID: ${MCP_CONTROL_PLANE_COOLIFY_PROJECT_UUID:?set MCP_CONTROL_PLANE_COOLIFY_PROJECT_UUID}
      MCP_CONTROL_PLANE_COOLIFY_ENVIRONMENT_NAME: ${MCP_CONTROL_PLANE_COOLIFY_ENVIRONMENT_NAME:-}
      MCP_CONTROL_PLANE_COOLIFY_ENVIRONMENT_UUID: ${MCP_CONTROL_PLANE_COOLIFY_ENVIRONMENT_UUID:-}
      MCP_CONTROL_PLANE_COOLIFY_SERVER_UUID: ${MCP_CONTROL_PLANE_COOLIFY_SERVER_UUID:?set MCP_CONTROL_PLANE_COOLIFY_SERVER_UUID}
      MCP_CONTROL_PLANE_COOLIFY_DESTINATION_UUID: ${MCP_CONTROL_PLANE_COOLIFY_DESTINATION_UUID:?set MCP_CONTROL_PLANE_COOLIFY_DESTINATION_UUID}
      MCP_CONTROL_PLANE_INFISICAL_API_BASE_URL: ${MCP_CONTROL_PLANE_INFISICAL_API_BASE_URL:-http://infisical-bridge:8080}
      MCP_CONTROL_PLANE_INFISICAL_PROJECT_SLUG: ${MCP_CONTROL_PLANE_INFISICAL_PROJECT_SLUG:?set MCP_CONTROL_PLANE_INFISICAL_PROJECT_SLUG}
      MCP_CONTROL_PLANE_INFISICAL_ENV_SLUG: ${MCP_CONTROL_PLANE_INFISICAL_ENV_SLUG:?set MCP_CONTROL_PLANE_INFISICAL_ENV_SLUG}
      MCP_CONTROL_PLANE_INFISICAL_MACHINE_CLIENT_ID: ${MCP_CONTROL_PLANE_INFISICAL_MACHINE_CLIENT_ID:?set MCP_CONTROL_PLANE_INFISICAL_MACHINE_CLIENT_ID}
      MCP_CONTROL_PLANE_INFISICAL_MACHINE_CLIENT_SECRET_PATH: /run/secrets/mcp-control-plane-infisical-machine-client-secret
      MCP_CONTROL_PLANE_MEALIE_BASE_URL: ${MCP_CONTROL_PLANE_MEALIE_BASE_URL:?set MCP_CONTROL_PLANE_MEALIE_BASE_URL}
      MCP_CONTROL_PLANE_ACTUAL_SERVER_URL: ${MCP_CONTROL_PLANE_ACTUAL_SERVER_URL:?set MCP_CONTROL_PLANE_ACTUAL_SERVER_URL}
      MCP_CONTROL_PLANE_TENANT_IMAGE_MEALIE: ${MCP_CONTROL_PLANE_TENANT_IMAGE_MEALIE:-}
      MCP_CONTROL_PLANE_TENANT_IMAGE_ACTUALBUDGET: ${MCP_CONTROL_PLANE_TENANT_IMAGE_ACTUALBUDGET:-}
      MCP_CONTROL_PLANE_TENANT_IMAGE_MEMORY: ${MCP_CONTROL_PLANE_TENANT_IMAGE_MEMORY:-}
      MCP_CONTROL_PLANE_TENANT_IMAGE_MODE: ${MCP_CONTROL_PLANE_TENANT_IMAGE_MODE:-local}
    volumes:
      - mcp-platform-data:/data/mcp-platform
      - type: bind
        source: ${MCP_SECRETS_DIR:-/data/mcp-platform-secrets}/mcp-control-plane-infisical-machine-client-secret
        target: /run/secrets/mcp-control-plane-infisical-machine-client-secret
        read_only: true
    expose:
      - "8081"
    healthcheck:
      test:
        - CMD
        - /app/mcp-control-plane
        - healthcheck
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      infisical-bridge:
        condition: service_healthy
    networks:
      - coolify

  mcp-edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    image: mcp-edge:coolify
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MCP_PLATFORM_ENV: ${MCP_PLATFORM_ENV:-production}
      MCP_PLATFORM_LOG_LEVEL: ${MCP_PLATFORM_LOG_LEVEL:-info}
      MCP_PLATFORM_DATABASE_URL: ${MCP_PLATFORM_DATABASE_URL:-file:/data/mcp-platform/mcp-platform.db}
      MCP_PLATFORM_DATA_VOLUME: ${MCP_PLATFORM_DATA_VOLUME:-mcp-platform-data}
      MCP_DOCKER_NETWORK: ${MCP_DOCKER_NETWORK:-coolify}
      MCP_SECRETS_DIR: ${MCP_SECRETS_DIR:-/data/mcp-platform-secrets}
      MCP_EDGE_HTTP_BIND_ADDR: ${MCP_EDGE_HTTP_BIND_ADDR:-:8080}
      MCP_EDGE_PUBLIC_BASE_URL: ${MCP_EDGE_PUBLIC_BASE_URL:?set MCP_EDGE_PUBLIC_BASE_URL}
      MCP_EDGE_AUTHENTIK_ISSUER_URL: ${MCP_EDGE_AUTHENTIK_ISSUER_URL:?set MCP_EDGE_AUTHENTIK_ISSUER_URL}
      MCP_EDGE_AUTHENTIK_CLIENT_ID: ${MCP_EDGE_AUTHENTIK_CLIENT_ID:?set MCP_EDGE_AUTHENTIK_CLIENT_ID}
      MCP_EDGE_AUTHENTIK_CLIENT_SECRET_PATH: /run/secrets/mcp-edge-authentik-client-secret
      MCP_EDGE_OPERATOR_TOKEN_PATH: /run/secrets/mcp-edge-operator-token
      MCP_EDGE_SESSION_ENCRYPTION_KEY_PATH: /run/secrets/mcp-edge-session-encryption-key
      MCP_EDGE_COOKIE_SECURE: ${MCP_EDGE_COOKIE_SECURE:-true}
    volumes:
      - mcp-platform-data:/data/mcp-platform
      - type: bind
        source: ${MCP_SECRETS_DIR:-/data/mcp-platform-secrets}/mcp-edge-authentik-client-secret
        target: /run/secrets/mcp-edge-authentik-client-secret
        read_only: true
      - type: bind
        source: ${MCP_SECRETS_DIR:-/data/mcp-platform-secrets}/mcp-edge-operator-token
        target: /run/secrets/mcp-edge-operator-token
        read_only: true
      - type: bind
        source: ${MCP_SECRETS_DIR:-/data/mcp-platform-secrets}/mcp-edge-session-encryption-key
        target: /run/secrets/mcp-edge-session-encryption-key
        read_only: true
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - /app/mcp-edge
        - healthcheck
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      mcp-control-plane:
        condition: service_healthy
    networks:
      - coolify

volumes:
  mcp-platform-data:
    name: ${MCP_PLATFORM_DATA_VOLUME:-mcp-platform-data}

networks:
  coolify:
    name: ${MCP_DOCKER_NETWORK:-coolify}
    external: true
