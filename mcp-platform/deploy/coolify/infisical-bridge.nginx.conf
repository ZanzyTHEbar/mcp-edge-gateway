server {
    listen 8080;
    server_name _;

    location / {
        proxy_http_version 1.1;
        proxy_pass https://coolify-proxy;
        proxy_set_header Host infisical.dragonnet.lan;
        proxy_set_header X-Forwarded-Host infisical.dragonnet.lan;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_name infisical.dragonnet.lan;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
}
